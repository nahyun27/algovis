<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    <link rel="icon" href="/favicon_io/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoTrace</title>

    <!-- Open Graph -->
    <meta property="og:title" content="AlgoTrace" />
    <meta property="og:description" content="복잡한 알고리즘을 한 단계씩 눈으로 이해하는 인터랙티브 시각화 플랫폼" />
    <meta property="og:image" content="https://algorithm-trace.vercel.app/og-image.png" />
    <meta property="og:url" content="https://algorithm-trace.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AlgoTrace" />
    <meta name="twitter:description" content="복잡한 알고리즘을 한 단계씩 눈으로 이해하는 인터랙티브 시각화 플랫폼" />
    <meta name="twitter:image" content="https://algorithm-trace.vercel.app/og-image.png" />
  </head>
  <body>
    <script>
      // Sync dark mode before first paint to prevent flash
      (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
